name: CI

on:
  push:
    branches: [main, "release/*"]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (CPU-only PyTorch)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,app]"
      - name: Lint
        run: ruff check moldetr scripts tests
      - name: Smoke test
        run: python scripts/quick_validation.py
      - name: Unit + scripts tests (no in-process server)
        env:
          MPLBACKEND: Agg
        run: pytest -q -rs -m "not e2e and not browser"
      - name: Reproduce headline numbers (committed data, no weights)
        run: python scripts/aggregate_experimental.py

  e2e:
    name: in-process e2e (gradio_client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (CPU PyTorch + app)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,app]"
      - name: In-process e2e
        env:
          MPLBACKEND: Agg
        run: pytest -q -rs -m e2e

  browser-e2e:
    name: browser e2e (chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (CPU PyTorch + app + browser)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,app,browser]"
          python -m playwright install --with-deps chromium
      - name: Browser e2e
        env:
          MPLBACKEND: Agg
        run: pytest tests/e2e -m browser -q
